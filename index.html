              "acceptedAnswer": {
                "@type": "Answer",
                "text": "No sistema SAC (Sistema de Amortização Constante), a parcela de amortização do principal é sempre igual, mas os juros diminuem com o tempo, tornando as prestações decrescentes. Na Tabela Price, a parcela total é fixa durante todo o contrato, porém no início a maior parte é composta por juros. O SAC é mais vantajoso no total pago, enquanto o Price facilita o planejamento por ter parcelas fixas."

              }
            },

              "@type": "Question",
